# .github/workflows/build-macos-intel.yml
#
# Builds Blender for Intel macOS from source. This is NOT a normal Blender
# build: Blender 5.0+ dropped official Intel macOS support, so there is no
# precompiled lib/macos_x64 package to fetch via `make update`. Instead this
# pipeline runs `make deps` (compiles the full VFX library stack — OIIO,
# OSL, OpenVDB, OpenColorIO, etc. — from source) and patches a hardcoded
# FATAL_ERROR that otherwise blocks the build afterwards.
#
# Source for this recipe: https://devtalk.blender.org/t/how-i-built-blender-5-1-on-an-intel-mac/45270
#

name: Build Blender (macOS Intel, from source)

on:
  workflow_dispatch:
    inputs:
      blender_ref:
        description: 'Blender branch or tag to build (e.g. blender-v5.1-release, v5.0.1)'
        required: true
        default: 'blender-v5.1-release'
      skip_deps_cache:
        description: 'Force a full rebuild of the library stack (ignore cache)'
        type: boolean
        default: false

jobs:
  build:
    runs-on: macos-26-intel
    timeout-minutes: 350  # GitHub's hard cap on standard runners is 360

    env:
      BLENDER_SRC: ${{ github.workspace }}
      BUILD_DIR: ${{ github.workspace }}/build_darwin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Disk usage checkpoint (start)
        run: df -h /

      - name: Install build tools
        run: |
          brew install autoconf bison dos2unix flex fmt git git-lfs libtool yasm automake nasm


      # --- CMP0042-class fix: pin CMake to the last 3.x release ------------
      # CMake 4.x removed OLD-policy support for a batch of legacy policies
      # (CMP0042 among them) — confirmed independently by a Homebrew
      # discussion of people hitting the same breakage after the 4.0.0 jump.
      # Several of Blender's vendored deps still call
      # cmake_policy(SET CMP0042 OLD) explicitly, which is now a hard error
      # rather than a warning. Pinning to 3.31.x sidesteps the whole class
      # of error instead of patching each dependency as it surfaces.
      - name: Install pinned CMake 3.31.x
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.31.x'
          # Uses the workflow's own GITHUB_TOKEN automatically to query the
          # release API — no extra secret needed, avoids anonymous rate limits.

      - name: Confirm pinned CMake is first on PATH
        run: |
          which cmake
          cmake --version   # must print 3.31.x, not whatever the runner image ships

      - name: Checkout Blender ref and update submodules
        run: |
          cd "$BLENDER_SRC"
          git checkout "${{ inputs.blender_ref }}"
          git submodule update --init --recursive || true

      # Cache entries are immutable per key, and actions/cache@v4 skips the
      # save step by default when the job fails. Using a run_id-suffixed key
      # for every success or failure, restore-keys prefix-matches to the most
      # recent one
      - name: Restore most recent deps build state (partial or complete)
        if: ${{ !inputs.skip_deps_cache }}
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ env.BUILD_DIR }}/deps_x64
            ${{ env.BLENDER_SRC }}/lib/macos_x64
          key: deps-${{ inputs.blender_ref }}-${{ hashFiles('blender-src/build_files/build_environment/cmake/versions.cmake') }}-${{ github.run_id }}
          restore-keys: |
            deps-${{ inputs.blender_ref }}-${{ hashFiles('blender-src/build_files/build_environment/cmake/versions.cmake') }}-

      - name: Build library dependencies from source (make deps)
        run: |
          cd "$BLENDER_SRC"
          make deps

      - name: Disk usage checkpoint (after make deps)
        run: df -h /

      # Always save, even on failure — this is what makes retries resumable
      # instead of restarting the ~40-library stack from zero each time.
      - name: Save deps build state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ env.BUILD_DIR }}/deps_x64
            ${{ env.BLENDER_SRC }}/lib/macos_x64
          key: deps-${{ inputs.blender_ref }}-${{ hashFiles('blender-src/build_files/build_environment/cmake/versions.cmake') }}-${{ github.run_id }}


      - name: Patch hardcoded Intel-lib FATAL_ERROR to a warning
        run: |
          cd "$BLENDER_SRC"
          FILE=build_files/cmake/platform/platform_apple.cmake
          sed -i '' \
            's|message(FATAL_ERROR "Mac OSX requires pre-compiled libs at: .\${LIBDIR}.")|message(WARNING "Pre-compiled libs at ${LIBDIR} are not a git repository — expected when built via make deps.")|' \
            "$FILE"

      - name: Build Blender
        run: |
          cd "$BLENDER_SRC"
          make

      - name: Package .dmg
        run: |
          cd "$BUILD_DIR"
          APP_PATH=$(find bin -maxdepth 1 -name "*.app" | head -n1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found in build_darwin/bin — build likely failed silently."
            exit 1
          fi
          VOL_NAME="Blender-${{ inputs.blender_ref }}-macos-intel"
          hdiutil create -volname "$VOL_NAME" -srcfolder "$APP_PATH" -ov -format UDZO "${VOL_NAME}.dmg"

      - name: Disk usage checkpoint (end)
        run: df -h /

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: blender-macos-intel-${{ inputs.blender_ref }}
          path: ${{ env.BUILD_DIR }}/*.dmg
          # retention-days: 14

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ inputs.blender_ref }}
          path: ${{ env.BLENDER_SRC }}/build_darwin/**/*.log
          retention-days: 7

      # Once a build fully succeeds, older run-scoped deps cache entries for
      # this ref+version-hash from failed partial builds no longer needed
      - name: Clean up superseded deps cache entries
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREFIX="deps-${{ inputs.blender_ref }}-${{ hashFiles('blender-src/build_files/build_environment/cmake/versions.cmake') }}-"
          gh cache list --key "$PREFIX" --json id,key,createdAt \
            | jq -r 'sort_by(.createdAt) | .[:-1][].id' \
            | xargs -I{} gh cache delete {} || true
